# ============================================================
# forest-change-monitor — site configuration
# ------------------------------------------------------------
# Describes WHAT to analyse (which place, which time windows)
# and WITH WHAT SETTINGS.  Nothing here is executable code —
# change these values to point the same pipeline at a different
# place or period.
# ============================================================

site:
  name: prey_lang_demo
  description: >
    Illustrative ~896 ha AOI within Prey Lang Wildlife Sanctuary, Cambodia.
    NOT a surveyed project boundary.  Chosen as a well-documented land-cover
    change hotspot for educational and portfolio purposes.
  aoi_path: data/aoi/demo_site.geojson
  reference_point: "13.174389 N, 105.619171 E"

# The two time windows compared.  Matching the same season in both years
# (Jan–Feb dry season) reduces false signals from normal seasonal variation.
periods:
  before:
    start: "2021-01-01"
    end:   "2021-02-28"
  after:
    start: "2023-01-01"
    end:   "2023-02-28"

# Version 1 data source — Hansen GFC annual tree-cover-loss raster
lossyear_raster:
  local_path:  data/raw/tree_cover_loss.tif
  source:      "Hansen GFC v1.11 (University of Maryland / Global Forest Watch)"
  collection:  "GFC-2023-v1.11"
  encoding:    "pixel_value = year - 2000  (0 = no loss, 1 = 2001, ..., 23 = 2023)"
  nodata:      255
  resolution:  "~30 m (1 arc-second)"
  license:     "CC BY 4.0"
  citation:    "Hansen et al., Science 2013, doi:10.1126/science.1244693"
  tile_url: >
    https://storage.googleapis.com/earthenginepartners-hansen/GFC-2023-v1.11/
    Hansen_GFC-2023-v1.11_lossyear_20N_100E.tif

# Years to summarise in Version 1
analysis_years: [2021, 2022, 2023]

# Projected CRS for accurate area calculation (m²)
projected_crs:
  epsg: 32648
  name: "WGS 84 / UTM zone 48N"
  note: "Correct for Prey Lang (~105.6 °E).  Used for AOI area only, not for raster ops."

# Output configuration
output:
  dir: outputs/
  formats:
    - csv
    - json
    - geotiff
    - png

# Phase 2 placeholder — Sentinel-2 / GEE settings (not used in Version 1)
sentinel2:
  collection: COPERNICUS/S2_SR_HARMONIZED
  max_cloud_cover_pct: 20
  cloud_mask_band: SCL
  status: "Phase 2 — requires Google Earth Engine access"
